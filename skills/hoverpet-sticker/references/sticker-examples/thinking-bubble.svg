<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 24">
  <style>
    .dot { animation: bob 900ms ease-in-out infinite; }
    .d2 { animation-delay: 120ms; }
    .d3 { animation-delay: 240ms; }
    @keyframes bob {
      0%, 100% { transform: translateY(0); opacity: .5; }
      50% { transform: translateY(-3px); opacity: 1; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
    }
  </style>
  <ellipse cx="17" cy="12" rx="12" ry="8" fill="#ffffff" stroke="#4b5563" stroke-width="1.5"/>
  <circle class="dot" cx="12" cy="12" r="1.8" fill="#4b5563"/>
  <circle class="dot d2" cx="17" cy="12" r="1.8" fill="#4b5563"/>
  <circle class="dot d3" cx="22" cy="12" r="1.8" fill="#4b5563"/>
</svg>
