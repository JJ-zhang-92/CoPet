<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 24">
  <style>
    .heart { transform-origin: 16px 14px; animation: pop 850ms ease-out infinite; }
    @keyframes pop {
      0% { opacity: 0; transform: translateY(5px) scale(.4); }
      30% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-8px) scale(1.15); }
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
    }
  </style>
  <path class="heart" d="M16 20C9 15 6 12 6 8.7 6 6.2 7.8 4.5 10.1 4.5c1.4 0 2.7.7 3.5 1.8.8-1.1 2.1-1.8 3.5-1.8 2.3 0 4.1 1.7 4.1 4.2C21.2 12 18.9 15.1 16 20z" fill="#ff5c8a"/>
</svg>
