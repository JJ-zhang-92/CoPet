<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 208">
  <style>
    .halo { transform-origin: 96px 88px; animation: pulse 1600ms ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { opacity: .45; transform: scale(.94); }
      50% { opacity: .9; transform: scale(1.04); }
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
    }
  </style>
  <ellipse class="halo" cx="96" cy="88" rx="52" ry="18" fill="none" stroke="#ffe680" stroke-width="8"/>
  <ellipse class="halo" cx="96" cy="88" rx="68" ry="28" fill="#ffe680" opacity=".18"/>
</svg>
