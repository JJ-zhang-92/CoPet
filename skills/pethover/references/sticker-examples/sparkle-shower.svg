<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 208">
  <style>
    .spark { transform-origin: center; animation: twinkle 1200ms ease-in-out infinite; }
    .s2 { animation-delay: 220ms; }
    .s3 { animation-delay: 440ms; }
    @keyframes twinkle {
      0%, 100% { opacity: .25; transform: scale(.7); }
      50% { opacity: 1; transform: scale(1.18); }
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; }
    }
  </style>
  <path class="spark" d="M52 40l5 12 12 5-12 5-5 12-5-12-12-5 12-5z" fill="#ffd166"/>
  <path class="spark s2" d="M132 56l4 9 9 4-9 4-4 9-4-9-9-4 9-4z" fill="#a78bfa"/>
  <path class="spark s3" d="M94 30l3 8 8 3-8 3-3 8-3-8-8-3 8-3z" fill="#5eead4"/>
</svg>
